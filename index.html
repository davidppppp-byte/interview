        // 初始化 Firebase 連線
        async function initializeDatabase() {
            try {
                // 初始化 App 與服務
                const app = initializeApp(userFirebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);

                // 匿名登入
                const userCred = await signInAnonymously(auth);
                const currentUser = userCred.user;

                if (!currentUser) {
                    setupLocalFallbackMode("Firebase 登入失敗");
                    return;
                }

                window.isFirebaseActive = true;
                window.firebaseConnectionStatus = 'connected';
                window.db = db;
                window.auth = auth;

                // 綁定資料庫寫入 API
                window.dbSetCandidate = async (cand) => {
                    if (!auth.currentUser) return;
                    await setDoc(doc(db, 'artifacts', window.appId, 'public', 'data', 'candidates', cand.id), cand);
                };

                window.dbDeleteCandidate = async (candId) => {
                    if (!auth.currentUser) return;
                    await deleteDoc(doc(db, 'artifacts', window.appId, 'public', 'data', 'candidates', candId));
                };

                window.dbSetVacancy = async (vac) => {
                    if (!auth.currentUser) return;
                    await setDoc(doc(db, 'artifacts', window.appId, 'public', 'data', 'vacancies', vac.id), vac);
                };

                window.dbDeleteVacancy = async (vacId) => {
                    if (!auth.currentUser) return;
                    await deleteDoc(doc(db, 'artifacts', window.appId, 'public', 'data', 'vacancies', vacId));
                };

                // 設定即時同步
                setupRealtimeSync(db);

            } catch (err) {
                console.warn("Firebase 連線失敗，改為本機快取模式：", err);
                setupLocalFallbackMode("Firebase 連線失敗，切換至本機快取。");
            }
        }

        // 本機快取備援方案
        function setupLocalFallbackMode(message) {
            window.isFirebaseActive = false;
            window.firebaseConnectionStatus = 'localMode';
            
            window.dbSetCandidate = async (cand) => {
                const idx = window.state.candidates.findIndex(c => c.id === cand.id);
                if (idx !== -1) window.state.candidates[idx] = cand;
                else window.state.candidates.push(cand);
                saveLocalState();
                window.renderApp();
            };

            window.dbDeleteCandidate = async (candId) => {
                window.state.candidates = window.state.candidates.filter(c => c.id !== candId);
                saveLocalState();
                window.renderApp();
            };

            window.dbSetVacancy = async (vac) => {
                const idx = window.state.vacancies.findIndex(v => v.id === vac.id);
                if (idx !== -1) window.state.vacancies[idx] = vac;
                else window.state.vacancies.push(vac);
                saveLocalState();
                window.renderApp();
            };

            window.dbDeleteVacancy = async (vacId) => {
                window.state.vacancies = window.state.vacancies.filter(v => v.id !== vacId);
                saveLocalState();
                window.renderApp();
            };

            window.renderApp();
            setTimeout(() => {
                window.showToast(message, true);
            }, 1000);
        }

        function saveLocalState() {
            localStorage.setItem('recruit_vacancies', JSON.stringify(window.state.vacancies));
            localStorage.setItem('recruit_candidates', JSON.stringify(window.state.candidates));
        }

        // 設定資料即時同步監聽
        function setupRealtimeSync(db) {
            const candidatesRef = collection(db, 'artifacts', window.appId, 'public', 'data', 'candidates');
            const vacanciesRef = collection(db, 'artifacts', window.appId, 'public', 'data', 'vacancies');

            // 監聽面試者狀態
            onSnapshot(candidatesRef, (snapshot) => {
                let candidates = [];
                snapshot.forEach(doc => {
                    candidates.push(doc.data());
                });

                if (candidates.length === 0 && window.state.candidates.length === DEFAULT_CANDIDATES.length) {
                    DEFAULT_CANDIDATES.forEach(async (c) => {
                        await window.dbSetCandidate(c);
                    });
                    return;
                }

                window.state.candidates = candidates;
                window.renderApp();
            }, (error) => {
                console.error("Candidates Sync Error:", error);
                setupLocalFallbackMode("資料庫同步失敗");
            });

            // 監聽職缺設定
            onSnapshot(vacanciesRef, (snapshot) => {
                let vacancies = [];
                snapshot.forEach(doc => {
                    vacancies.push(doc.data());
                });

                if (vacancies.length === 0 && window.state.vacancies.length === DEFAULT_VACANCIES.length) {
                    DEFAULT_VACANCIES.forEach(async (v) => {
                        await window.dbSetVacancy(v);
                    });
                    return;
                }

                window.state.vacancies = vacancies;
                window.renderApp();
            }, (error) => {
                console.error("Vacancies Sync Error:", error);
            });
        }

        // 綁定全域還原 Excel 模擬資料庫方法
        window.resetToExcelData = async function() {
            if (window.isFirebaseActive) {
                window.showToast("正在重設雲端資料中...");
                for (let c of window.state.candidates) {
                    await window.dbDeleteCandidate(c.id);
                }
                for (let v of window.state.vacancies) {
                    await window.dbDeleteVacancy(v.id);
                }
                for (let v of DEFAULT_VACANCIES) {
                    await window.dbSetVacancy(v);
                }
                for (let c of DEFAULT_CANDIDATES) {
                    await window.dbSetCandidate(c);
                }
                window.showToast("成功還原雲端資料庫自 Excel 預設資料！");
            } else {
                window.state.vacancies = JSON.parse(JSON.stringify(DEFAULT_VACANCIES));
                window.state.candidates = JSON.parse(JSON.stringify(DEFAULT_CANDIDATES));
                saveLocalState();
                window.renderApp();
                window.showToast("成功還原本地快取自 Excel 預設資料！");
            }
        }

        // 啟動連線
        initializeDatabase();
    </script>

    <script>
        let searchQuery = '';

        // 日期時間格式化工具
        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return '未排定';
            try {
                const dt = new Date(dateTimeStr);
                if (isNaN(dt.getTime())) return dateTimeStr;
                const y = dt.getFullYear();
                const m = String(dt.getMonth() + 1).padStart(2, '0');
                const d = String(dt.getDate()).padStart(2, '0');
                const hr = String(dt.getHours()).padStart(2, '0');
                const min = String(dt.getMinutes()).padStart(2, '0');
                return `${y}-${m}-${d} ${hr}:${min}`;
            } catch (e) {
                return dateTimeStr;
            }
        }

        // 搜尋處理
        function searchCandidate(val) {
            searchQuery = val.trim().toLowerCase();
            renderContent();
        }

        // 導覽分頁切換
        function navigate(tabId) {
            window.state.activeTab = tabId;
            const buttons = document.querySelectorAll('#sidebar-nav button');
            buttons.forEach(btn => {
                btn.className = "w-full flex items-center justify-between px-3 py-2.5 text-sm font-medium rounded-lg transition text-slate-700 hover:bg-slate-100 border-l-4 border-transparent";
            });
            const activeBtn = document.getElementById(`nav-${tabId}`);
            if (activeBtn) {
                activeBtn.className = "w-full flex items-center justify-between px-3 py-2.5 text-sm font-semibold rounded-lg transition bg-indigo-50 text-indigo-700 border-l-4 border-indigo-600";
            }
            renderApp();
        }

        // 更新 UI 頂端連線狀態與 Badges 
        function updateBadges() {
            const statusPill = document.getElementById('db-status-pill');
            const alertBox = document.getElementById('local-mode-alert');
            if (statusPill) {
                if (window.firebaseConnectionStatus === 'connected') {
                    statusPill.className = "px-3 py-1 text-xs rounded-full border flex items-center gap-1.5 font-medium transition-all duration-300 bg-emerald-500/15 text-emerald-600 border-emerald-500/30";
                    statusPill.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span> 雲端連線中 (即時同步)`;
                    if (alertBox) alertBox.classList.add('hidden');
                } else if (window.firebaseConnectionStatus === 'localMode') {
                    statusPill.className = "px-3 py-1 text-xs rounded-full border flex items-center gap-1.5 font-medium transition-all duration-300 bg-amber-500/15 text-amber-600 border-amber-500/30";
                    statusPill.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-500"></span> 本地快取模式`;
                    if (alertBox) alertBox.classList.remove('hidden');
                } else {
                    statusPill.className = "px-3 py-1 text-xs rounded-full border flex items-center gap-1.5 font-medium transition-all duration-300 bg-slate-800 text-slate-400 border-slate-700";
                    statusPill.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-500 animate-pulse"></span> 雲端資料載入中`;
                }
            }

            const total = window.state.candidates.length;
            const pending = window.state.candidates.filter(c => c.status === '待面試').length;
            const secondPending = window.state.candidates.filter(c => {
                const vac = window.state.vacancies.find(v => v.id === c.vacancyId);
                const hasSecondStep = vac ? vac.steps.includes("二次面試") : false;
                return (c.status === '面試通過' || c.status === '通過') && hasSecondStep && (c.secondStatus === '未排程' || c.secondStatus === '待排程');
            }).length;

            document.getElementById('badge-total').innerText = total;
            document.getElementById('badge-pending').innerText = pending;
            document.getElementById('badge-second').innerText = secondPending;
            document.getElementById('badge-vacancies').innerText = window.state.vacancies.length;
        }

        // 動態填充職缺篩選
        function updateVacancyFilterDropdown() {
            const select = document.getElementById('filter-vacancy');
            if (!select) return;
            const currentVal = window.state.filters.vacancy;
            select.innerHTML = '<option value="All">所有職缺</option>';
            window.state.vacancies.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = `${v.name} (${v.department})`;
                if (v.id === currentVal) opt.selected = true;
                select.appendChild(opt);
            });
        }

        // 篩選條件過濾資料
        function getFilteredCandidates() {
            return window.state.candidates.filter(c => {
                if (window.state.filters.location !== 'All') {
                    const locMatch = c.location === window.state.filters.location || (c.secondLocation === window.state.filters.location);
                    if (!locMatch) return false;
                }
                if (window.state.filters.vacancy !== 'All' && c.vacancyId !== window.state.filters.vacancy) {
                    return false;
                }
                if (window.state.filters.status !== 'All') {
                    if (window.state.filters.status === '已確認' && c.secondStatus !== '已確認') return false;
                    if (window.state.filters.status === '面試通過' && (c.status !== '面試通過' && c.status !== '通過')) return false;
                    if (window.state.filters.status !== '已確認' && window.state.filters.status !== '面試通過' && c.status !== window.state.filters.status) return false;
                }
                if (searchQuery) {
                    const nameMatch = c.name.toLowerCase().includes(searchQuery);
                    const phoneMatch = c.phone && c.phone.includes(searchQuery);
                    if (!nameMatch && !phoneMatch) return false;
                }
                return true;
            });
        }

        // 快速更新過濾器
        function updateFilter(key, val) {
            window.state.filters[key] = val;
            renderApp();
        }

        function renderContent() {
            const target = document.getElementById('main-content-target');
            if (!target) return;
            const list = getFilteredCandidates();

            if (window.state.activeTab === 'dashboard') {
                renderDashboard(target, list);
            } else if (window.state.activeTab === 'candidates') {
                renderCandidatesPage(target, list);
            } else if (window.state.activeTab === 'second-interview') {
                renderSecondInterviewPage(target);
            } else if (window.state.activeTab === 'settings') {
                renderSettingsPage(target);
            }
        }
    </script>

    <script>

                                    </span>

                                        <i class="fa-solid fa-location-dot text-rose-500"></i>

                                    </span>
                                </div>
                                <h4 class="font-bold text-slate-800 text-sm mb-1">${c.name} <span class="text-xs font-normal text-slate-500">應徵 ${vacName}</span></h4>

                    } else if (c.status === "未通過") {

                    } else if ((c.status === "面試通過" || c.status === "通過" || c.status === "面釋通過") && c.secondStatus === "待排程") {
                        statusBadge = `<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full font-semibold">二試待排程</span>`;
                    } else if ((c.status === "面釋通過" || c.status === "面試通過" || c.status === "通過") && c.secondStatus === "已確認") {
                        statusBadge = `<span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full font-semibold">二試已排程</span>`;

                        statusBadge = `<span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-full font-semibold">錄取確認</span>`;
                    }

                    let secondColHtml = '';
                    if (hasSecond) {
                        if (c.secondStatus === '聯絡中' || c.secondStatus === '待排程') {
                            secondColHtml = `<span class="text-amber-600 font-medium">1面通過，待排程二試</span>`;
                        } else if (c.secondStatus === '已確認') {

                        } else {
                            secondColHtml = `<span class="text-slate-400 italic">待確認與安排</span>`;
                        }
                    } else {
                        secondColHtml = `<span class="text-slate-300 italic">無二次流程</span>`;
                    }

                    const vacancyName = vac ? vac.name : '未知職缺';
                    const departmentName = vac ? vac.department : '無';

                    rowsHtml += `
                        <tr class="hover:bg-slate-50/80 transition-colors">
                            <td class="py-3.5 px-4">
                                <div class="font-bold text-slate-800">${vacancyName}</div>
                                <div class="text-[10px] text-slate-400 mt-0.5">${departmentName}</div>
                            </td>
                            <td class="py-3.5 px-4">
                                <div class="font-bold text-slate-800">${c.name}</div>
                                <div class="text-[10px] text-slate-400 mt-0.5">${c.phone || '無電話'}</div>
                            </td>
                            <td class="py-3.5 px-4 font-medium text-rose-600">
                                <i class="fa-solid fa-location-dot text-[10px] mr-1"></i>${c.location}
                            </td>
                            <td class="py-3.5 px-4">
                                <div class="text-slate-700">面試官: <strong>${c.interviewer}</strong></div>
                                <div class="text-[10px] text-slate-400 mt-0.5">${formatDateTime(c.dateTime)}</div>
                            </td>
                            <td class="py-3.5 px-4">
                                ${secondColHtml}
                            </td>
                            <td class="py-3.5 px-4 text-center">${statusBadge}</td>
                            <td class="py-3.5 px-4 text-center">
                                <button onclick="editCandidate('${c.id}')" class="text-indigo-600 hover:text-indigo-900 font-medium mr-2">編輯</button>
                                <button onclick="deleteCandidate('${c.id}')" class="text-red-500 hover:text-red-700 font-medium">刪除</button>

            target.innerHTML = `

                            <span class="text-xs text-emerald-100 font-medium block">面試通過 / 二試確認中</span>
                            <span class="text-3xl font-bold mt-1 block">${passCount} <span class="text-xs font-normal">人</span></span>
                        </div>
                        <div class="bg-white/10 p-3 rounded-xl"><i class="fa-solid fa-square-check text-2xl"></i></div>
                    </div>

                    <div class="flex items-center justify-between border-b border-slate-100 pb-3 mb-4">
                        <div class="flex items-center gap-2">
                            <span class="bg-rose-100 text-rose-600 p-1.5 rounded-lg"><i class="fa-regular fa-calendar-days"></i></span>

                        </div>
                        <span class="text-xs text-slate-400">雲端即時排程</span>
                    </div>
                    ${upcomingHtml}

                                    <th class="py-3 px-4">第一階段 (面試官/時間)</th>
                                    <th class="py-3 px-4">第二階段複試</th>
                                    <th class="py-3 px-4 text-center">目前進度與狀態</th>
                                    <th class="py-3 px-4 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
    </script>

    <script>
        function renderCandidatesPage(target, list) {
            let cardsHtml = '';
            if (list.length === 0) {
                cardsHtml = `
                    <div class="col-span-2 py-12 text-center text-slate-400 text-xs">
                        目前無符合篩選條件的面試人員
                    </div>
                `;
            } else {
                list.forEach(c => {
                    const vac = window.state.vacancies.find(v => v.id === c.vacancyId);
                    
                    let borderClass = "border-slate-200";
                    if (c.status === "待面試") {
                        borderClass = "border-amber-200 bg-amber-50/10";
                    } else if (c.status === "面試通過" || c.status === "通過" || c.status === "面釋通過") {
                        borderClass = "border-emerald-200 bg-emerald-50/10";
                    } else if (c.status === "未通過") {
                        borderClass = "border-slate-200 bg-slate-50/50";
                    }

                    const vacName = vac ? vac.name : '未知職缺';
                    const timeLabel = formatDateTime(c.dateTime);
                    const noteContent = c.note || '尚無備註或初試評語';

                    cardsHtml += `
                        <div class="bg-white border ${borderClass} rounded-xl p-4 flex flex-col justify-between shadow-sm">
                            <div>
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <span class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] rounded-md font-bold">
                                            ${vacName}
                                        </span>
                                        <span class="ml-1 text-[10px] text-slate-400">一試主管: ${c.interviewer}</span>
                                    </div>
                                    <span class="text-xs font-semibold ${c.status === '面試通過' || c.status === '通過' || c.status === '面釋通過' ? 'text-emerald-600' : c.status === '未通過' ? 'text-red-500' : 'text-amber-600'}">
                                        狀態：${c.status}
                                    </span>
                                </div>

                                <div class="mt-3">
                                    <h4 class="font-bold text-slate-800 text-base">${c.name}</h4>
                                    <p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> 電話: ${c.phone || '無'}</p>
                                    <div class="flex items-center gap-3 mt-2 text-xs text-slate-500 font-medium">
                                        <span><i class="fa-solid fa-location-dot text-rose-500 mr-1"></i> 場地：<strong class="text-rose-600">${c.location}</strong></span>
                                        <span><i class="fa-regular fa-clock mr-1"></i> 時間：<strong>${timeLabel}</strong></span>
                                    </div>
                                </div>

                                <div class="mt-3 p-2.5 bg-slate-50 rounded-lg border border-slate-100 text-xs text-slate-600">
                                    <strong>面試評語備註：</strong>${noteContent}
                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center gap-2">
                                <div class="flex gap-1.5">
                                    <button onclick="updateCandidateStatus('${c.id}', '面試通過')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 text-[11px] font-bold px-2.5 py-1.5 rounded transition">
                                        <i class="fa-solid fa-check mr-1"></i>面試通過
                                    </button>
                                    <button onclick="updateCandidateStatus('${c.id}', '未通過')" class="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 text-[11px] font-bold px-2.5 py-1.5 rounded transition">
                                        <i class="fa-solid fa-xmark mr-1"></i>未通過
                                    </button>
                                </div>
                                <button onclick="editCandidate('${c.id}')" class="text-slate-500 hover:text-indigo-600 text-xs font-medium">
                                    <i class="fa-solid fa-pen-to-square"></i> 編輯
                                </button>
                            </div>
                        </div>
                    `;
                });
            }

            target.innerHTML = `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2">
                            <span class="bg-indigo-100 text-indigo-600 p-1.5 rounded-lg"><i class="fa-solid fa-users-gear"></i></span>
                            <h3 class="font-bold text-slate-800 text-sm">面試人員狀態評估 (HR / 主管協作)</h3>
                        </div>
                        <button onclick="openCandidateModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-2 rounded-lg font-medium flex items-center gap-1.5 transition">
                            <i class="fa-solid fa-user-plus"></i> 新增面試人員
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 mb-4">
                        面試官與人資可在這裡針對初試候選人進行「面試通過」或「未通過」操作。若設定為「面試通過」且該職缺在後台設有二次面試，系統將會引導進入二次複試排程。
                    </p>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${cardsHtml}
                    </div>
                </div>
            `;
        }

        // 快速更新候選人狀態 (通過 / 未通過)
        async function updateCandidateStatus(candId, newStatus) {
            const cand = window.state.candidates.find(c => c.id === candId);
            if (!cand) return;

            cand.status = newStatus;
            
            // 判斷是否需要推到二試
            const vac = window.state.vacancies.find(v => v.id === cand.vacancyId);
            const hasSecond = vac ? vac.steps.includes("二次面試") : false;

            if ((newStatus === '面試通過' || newStatus === '通過' || newStatus === '面釋通過') && hasSecond) {
                cand.secondStatus = '待排程';
                cand.secondInterviewer = vac.interviewers[1] || "執行長";

        // 調整二次面試官輸入欄位顯示
        function adjustInterviewerFields(stageCount) {
            const field = document.getElementById('field-second-interviewer');
            const int2 = document.getElementById('form-vac-int2');
            if (!field || !int2) return;
            if (stageCount === "1") {
                field.classList.add('hidden');
                int2.removeAttribute('required');
            } else {
                field.classList.remove('hidden');
                int2.setAttribute('required', 'required');
            }
        }

        // 開啟/關閉新增職缺 Modal
        function openVacancyModal() {
            document.getElementById('vacancy-form').reset();
            document.getElementById('form-vacancy-id').value = "";
            document.getElementById('vacancy-modal-title').innerText = "新增職缺與面試流程";
            adjustInterviewerFields("2");
            document.getElementById('vacancy-modal').classList.remove('hidden');
        }

        function closeVacancyModal() {
            document.getElementById('vacancy-modal').classList.add('hidden');
        }

        // 新增與修改職缺提交處理
        async function handleVacancySubmit(e) {
            e.preventDefault();
            const id = document.getElementById('form-vacancy-id').value;
            const name = document.getElementById('form-vac-name').value;
            const dept = document.getElementById('form-vac-dept').value;
            const stageCount = document.getElementById('form-vac-stagecount').value;
            const int1 = document.getElementById('form-vac-int1').value;
            
            const interviewers = [int1];
            const steps = ["初審", "一次面試"];
            
            if (stageCount === "2") {
                const int2 = document.getElementById('form-vac-int2').value;
                interviewers.push(int2);
                steps.push("二次面試");
            }
            steps.push("錄取");

            if (id) {
                const vac = window.state.vacancies.find(v => v.id === id);
                if (vac) {
                    vac.name = name;
                    vac.department = dept;
                    vac.steps = steps;
                    vac.interviewers = interviewers;
                    window.showToast(`已成功修改職缺 『${name}』 的面試流程配置！`);
                    await window.dbSetVacancy(vac);
                }
            } else {
                const newVac = {
                    id: 'v_' + Date.now(),
                    name,
                    department: dept,
                    steps,
                    interviewers
                };
                window.showToast(`已成功新增開放職缺：『${name}』！`);
                await window.dbSetVacancy(newVac);
            }

            closeVacancyModal();
        }

        // 編輯職缺流程
        function editVacancy(id) {
            const vac = window.state.vacancies.find(v => v.id === id);
            if (!vac) return;

            document.getElementById('form-vacancy-id').value = vac.id;
            document.getElementById('form-vac-name').value = vac.name;
            document.getElementById('form-vac-dept').value = vac.department;
            
            const hasSecond = vac.steps.includes("二次面試");
            document.getElementById('form-vac-stagecount').value = hasSecond ? "2" : "1";
            adjustInterviewerFields(hasSecond ? "2" : "1");

            document.getElementById('form-vac-int1').value = vac.interviewers[0] || "";
            if (hasSecond) {
                document.getElementById('form-vac-int2').value = vac.interviewers[1] || "";
            }

            document.getElementById('vacancy-modal-title').innerText = "編輯職缺與預設流程";
            document.getElementById('vacancy-modal').classList.remove('hidden');

                await window.dbDeleteVacancy(id);

    <script>
        // 開啟/關閉面試人員 Modal
        function openCandidateModal() {
            document.getElementById('candidate-form').reset();
            document.getElementById('form-candidate-id').value = "";
            document.getElementById('modal-title').innerText = "新增面試人員與地點";
            
            populateFormVacancySelect();
            
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('form-datetime').value = now.toISOString().slice(0, 16);

            document.getElementById('candidate-modal').classList.remove('hidden');
        }

        function closeCandidateModal() {
            document.getElementById('candidate-modal').classList.add('hidden');
        }

        // 動態填充新增面試者中的應徵職缺下拉
        function populateFormVacancySelect() {
            const select = document.getElementById('form-vacancy');
            if (!select) return;
            select.innerHTML = '<option value="" disabled selected>請選擇職缺</option>';
            window.state.vacancies.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = `${v.name} (${v.department})`;
                select.appendChild(opt);
            });
        }

        // 當在表單選擇職缺時，自動根據預設配置填入對應「面試官」
        function onFormVacancyChange(vacId) {
            const vac = window.state.vacancies.find(v => v.id === vacId);
            if (vac) {
                document.getElementById('form-interviewer').value = vac.interviewers[0] || "";
                // 預設場地
                if (vac.department === '製造部') {
                    document.getElementById('form-location').value = '生產中心';
                } else if (vac.department === '物流部' || vac.department === '出貨部') {
                    document.getElementById('form-location').value = '物流中心';
                } else if (vac.department === '行銷部' || vac.department === '財務部' || vac.department === '行政管理部' || vac.department === '人資組' || vac.department === '研發部') {
                    document.getElementById('form-location').value = '北屯總部';
                } else {
                    document.getElementById('form-location').value = '北屯總部';
                }
            }
        }

        // 提交面試人員資料 (新增 / 編輯)
        async function handleCandidateSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('form-candidate-id').value;
            const name = document.getElementById('form-name').value;
            const phone = document.getElementById('form-phone').value;
            const vacancyId = document.getElementById('form-vacancy').value;
            const location = document.getElementById('form-location').value;
            const dateTime = document.getElementById('form-datetime').value;
            const interviewer = document.getElementById('form-interviewer').value;
            const status = document.getElementById('form-status').value;
            const note = document.getElementById('form-note').value;

            const vac = window.state.vacancies.find(v => v.id === vacancyId);
            const hasSecond = vac ? vac.steps.includes("二次面試") : false;

            if (id) {
                const cand = window.state.candidates.find(c => c.id === id);
                if (cand) {
                    cand.name = name;
                    cand.phone = phone;
                    cand.vacancyId = vacancyId;
                    cand.location = location;
                    cand.dateTime = dateTime;
                    cand.interviewer = interviewer;
                    
                    const prevStatus = cand.status;
                    cand.status = status;
                    cand.note = note;

                    if ((status === '面試通過' || status === '通過' || status === '面釋通過') && hasSecond && prevStatus !== '面試通過' && prevStatus !== '通過' && prevStatus !== '面釋通過') {
                        cand.secondStatus = '待排程';
                        cand.secondInterviewer = vac.interviewers[1] || "執行長、重恩";
                        cand.secondLocation = "北屯總部";
                    }

                    window.showToast(`已成功編輯候選人 『${name}』 的面試資料！`);
                    await window.dbSetCandidate(cand);
                }
            } else {
                const newCand = {
                    id: 'c_' + Date.now(),
                    name,
                    phone,
                    vacancyId,
                    location,
                    stage: "一次面試",
                    status,
                    interviewer,
                    dateTime,
                    note,
                    secondInterviewer: hasSecond ? (vac.interviewers[1] || "執行長、重恩") : "",
                    secondDateTime: "",
                    secondLocation: hasSecond ? "北屯總部" : "",
                    secondStatus: ((status === '面試通過' || status === '通過' || status === '面釋通過') && hasSecond) ? '待排程' : (hasSecond ? '未排程' : '')
                };

                window.showToast(`已成功安排 『${name}』 到 『${location}』 進行面試！`);
                await window.dbSetCandidate(newCand);
            }

            closeCandidateModal();
        }

        // 編輯面試人員 (把資料填回表單)
        function editCandidate(id) {
            const cand = window.state.candidates.find(c => c.id === id);
            if (!cand) return;

            populateFormVacancySelect();

            document.getElementById('form-candidate-id').value = cand.id;
            document.getElementById('form-name').value = cand.name;
            document.getElementById('form-phone').value = cand.phone || "";
            document.getElementById('form-vacancy').value = cand.vacancyId;
            document.getElementById('form-location').value = cand.location;
            document.getElementById('form-datetime').value = cand.dateTime || "";
            document.getElementById('form-interviewer').value = cand.interviewer;
            document.getElementById('form-status').value = cand.status;
            document.getElementById('form-note').value = cand.note || "";

            document.getElementById('modal-title').innerText = "編輯面試人員排程";
            document.getElementById('candidate-modal').classList.remove('hidden');
        }

        // 刪除面試者
        async function deleteCandidate(id) {
            const cand = window.state.candidates.find(c => c.id === id);
            if (cand) {
                window.showToast(`已刪除面試者：『${cand.name}』`);
                await window.dbDeleteCandidate(id);
            }
        }
    </script>

    <script>
        // 全域 Toast 顯示
        window.showToast = function(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            if (!toast || !toastMsg || !toastIcon) return;
            
            toastMsg.innerText = msg;
            if (isError) {
                toastIcon.className = "fa-solid fa-triangle-exclamation text-rose-500";
            } else {
                toastIcon.className = "fa-solid fa-circle-check text-emerald-400";
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 主應用渲染流程
        window.renderApp = function() {
            updateBadges();
            updateVacancyFilterDropdown();
            renderContent();
        }
